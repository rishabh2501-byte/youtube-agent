name: Auto Upload YouTube Videos

on:
  schedule:
    # Runs every 10 minutes
    - cron: '*/10 * * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  create-video:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create .env file
        run: |
          echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" >> .env
          echo "LLM_PROVIDER=groq" >> .env
          echo "TTS_PROVIDER=gtts" >> .env
          echo "IMAGE_GENERATOR=placeholder" >> .env
          echo "VIDEO_DURATION_SECONDS=60" >> .env
          echo "TRENDING_REGION=US" >> .env
          echo "OUTPUT_DIR=output" >> .env

      - name: Create YouTube credentials
        run: |
          mkdir -p credentials
          echo '${{ secrets.YOUTUBE_CLIENT_SECRETS }}' > credentials/client_secrets.json
          echo '${{ secrets.YOUTUBE_TOKEN }}' > credentials/youtube_token.json

      - name: Run video creation
        run: python cron_job.py
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Upload artifacts (for debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: output-${{ github.run_number }}
          path: output/
          retention-days: 1
